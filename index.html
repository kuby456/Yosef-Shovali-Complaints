<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>טופס מסירת תלונות על הרב שובלי</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e3a8a,#312e81);
  color:white;
  padding:20px;
}

.container{
  max-width:850px;
  margin:auto;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:24px;
  padding:22px;
  box-shadow:0 20px 60px rgba(0,0,0,.35);
}

h1{
  margin-top:0;
  font-size:26px;
}

.notice{
  background:rgba(255,255,255,0.14);
  border-right:5px solid #facc15;
  padding:14px;
  border-radius:14px;
  margin-bottom:18px;
  line-height:1.6;
}

label{
  display:block;
  margin-top:14px;
  margin-bottom:6px;
  font-weight:bold;
}

input, textarea, select{
  width:100%;
  padding:13px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.12);
  color:white;
  font-size:16px;
  outline:none;
}

input::placeholder,
textarea::placeholder{
  color:rgba(255,255,255,.65);
}

textarea{
  min-height:130px;
  resize:vertical;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

button{
  width:100%;
  margin-top:22px;
  padding:15px;
  border:0;
  border-radius:16px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
}

button:active{
  transform:scale(.98);
}

.msg{
  margin-top:15px;
  padding:13px;
  border-radius:14px;
  display:none;
}

.success{background:rgba(34,197,94,.25)}
.error{background:rgba(239,68,68,.25)}

@media(max-width:650px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="container">

  <h1> טופס מסירת מידע / תלונה<br>אנחנו קוראים לכל הנפגעים מהרב יוסף שובלי ותמידיו ללכת לתחת המשטרה הקרובה או לכתוב לנו ואנחנו נדאג להעביר למשטרה</h1>

  <div class="notice">
    הטופס מיועד למסירת מידע בצורה למשטרה הגשת תולנות על הרב יוסף שובלי.
   אם מדובר בסכנה מיידית — פונים למשטרה או למוקד חירום.
  </div>

  <form id="complaintForm">

    <div class="grid">
      <div>
        <label>שם (אפשא בדוי)</label>
        <input id="full_name" placeholder="לדוגמה: ישראל ישראלי">
      </div>

      <div>
        <label>טלפון ליצירת קשר</label>
        <input id="phone" placeholder="050-0000000">
      </div>
    </div>

    <label>למי המידע נמסר?</label>
    <input id="subject_name" value="לתחנת המשטרה">

    <label>סוג הפנייה</label>
    <select id="complaint_type">
      <option value="">בחר סוג פנייה</option>
      <option value="personal_complaint">תלונה אישית</option>
      <option value="witness_info">מידע / עדות</option>
      <option value="heard_info">מידע ששמעתי</option>
      <option value="other">אחר</option>
    </select>

    <label>מתי זה קרה?</label>
    <input id="event_date" type="date">

    <label>איפה זה קרה?</label>
    <input id="location" placeholder="עיר / מקום / כתובת אם ידוע">

    <label>תיאור הפנייה</label>
    <textarea id="description" placeholder="כתוב כאן את הפרטים בצורה מדויקת, בלי קללות ובלי פרסום מיותר"></textarea>

    <label>האם יש ראיות / מסמכים / עדים?</label>
    <textarea id="evidence" placeholder="לדוגמה: הודעות, הקלטות, שמות עדים, תאריכים"></textarea>

    <label>רמת דחיפות</label>
    <select id="urgency">
      <option value="normal">רגיל</option>
      <option value="important">חשוב</option>
      <option value="urgent">דחוף</option>
    </select>

    <button type="submit">שלח פנייה</button>

    <div id="msg" class="msg"></div>

  </form>
</div>

<script>
/* ===== Supabase Config ===== */
const SUPABASE_URL = "https://nnzkymqpnthpvwwaoxql.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_3lLmXE22vrgHYxDRc_jwGA_1b4RMMKA";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ===== Elements ===== */
const form = document.getElementById("complaintForm");
const msg = document.getElementById("msg");

function showMsg(text, type){
  msg.textContent = text;
  msg.className = "msg " + type;
  msg.style.display = "block";
}

form.addEventListener("submit", async function(e){
  e.preventDefault();

  const data = {
    full_name: document.getElementById("full_name").value.trim(),
    phone: document.getElementById("phone").value.trim(),
    email: document.getElementById("email").value.trim(),
    subject_name: document.getElementById("subject_name").value.trim(),
    complaint_type: document.getElementById("complaint_type").value,
    event_date: document.getElementById("event_date").value || null,
    location: document.getElementById("location").value.trim(),
    description: document.getElementById("description").value.trim(),
    evidence: document.getElementById("evidence").value.trim(),
    urgency: document.getElementById("urgency").value
  };

  if(!data.full_name || !data.phone || !data.description || !data.complaint_type){
    showMsg("חובה למלא שם, טלפון, סוג פנייה ותיאור.", "error");
    return;
  }

  const { error } = await sb
    .from("complaints")
    .insert([data]);

  if(error){
    console.error(error);
    showMsg("שגיאה בשליחה. בדוק את ההגדרות של Supabase.", "error");
    return;
  }

  showMsg("הפנייה נשלחה בהצלחה.", "success");
  form.reset();
  document.getElementById("subject_name").value = "לתחנת המשטרה";
</script>

</body>
</html>
